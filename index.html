<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcade Quiz</title>

<style>
body {
  margin: 0;
  background: linear-gradient(180deg, #2a1f5a, #0f172a);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: Arial;
}

/* الجهاز */
.arcade-container {
  position: relative;
  width: 90%;
  max-width: 480px;
  filter: drop-shadow(0 0 25px rgba(255, 200, 0, 0.3));
}

.arcade-img {
  width: 100%;
  display: block;
}

/* الشاشة */
.screen {
  position: absolute;
  top: 20%;
  left: 50%;
  transform: translateX(-50%);
  width: 70%;
  height: 42%;

  background: rgba(11, 28, 61, 0.95);
  border-radius: 15px;
  padding: 15px;
  color: white;

  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* الشريط العلوي */
.top-bar {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}

/* السؤال */
.question {
  text-align: center;
  font-size: 20px;
  margin: 10px 0;
}

/* الخيارات */
.options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.option {
  background: #1e3a8a;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
  text-align: center;
}

.option:hover {
  background: #3b82f6;
  transform: scale(1.05);
}

/* الأزرار */
.controls {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.controls button {
  padding: 6px 12px;
  border: none;
  border-radius: 6px;
  background: #ff4da6;
  color: white;
  cursor: pointer;
}

/* Responsive */
@media (max-width: 768px) {
  .arcade-container {
    width: 95%;
    max-width: 100%;
  }

  .screen {
    width: 75%;
    height: 45%;
    padding: 4vw;
  }

  .question {
    font-size: 5vw;
  }

  .top-bar {
    font-size: 3.5vw;
  }

  .option {
    font-size: 4vw;
    padding: 3vw;
  }

  .controls button {
    font-size: 3.5vw;
    padding: 2vw 4vw;
  }
}
</style>

</head>
<body>

<div class="arcade-container">
  
<img src="https://i.imgur.com/N8PRIKM.jpeg" class="arcade-img">

  <div class="screen">

    <div class="top-bar">
      <span id="level">Level 1</span>
      <span id="score">Score: 0</span>
    </div>

    <div class="question" id="question"></div>

    <div class="options" id="options"></div>

    <div class="controls">
      <button onclick="nextQuestion()">Next</button>
      <button onclick="restartGame()">Restart</button>
    </div>

  </div>

</div>

<script>

const questions = [
  {
    q: "كم عدد كواكب المجموعة الشمسية؟",
    options: ["7", "8", "9", "10"],
    answer: 1
  },
  {
    q: "عاصمة السعودية؟",
    options: ["جدة", "الرياض", "مكة", "الدمام"],
    answer: 1
  },
  {
    q: "2 + 2 = ؟",
    options: ["3", "4", "5", "6"],
    answer: 1
  }
];

let current = 0;
let score = 0;

function loadQuestion() {
  const q = questions[current];

  document.getElementById("question").innerText = q.q;
  document.getElementById("level").innerText = "Level " + (current + 1);
  document.getElementById("score").innerText = "Score: " + score;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach((opt, index) => {
    const div = document.createElement("div");
    div.classList.add("option");
    div.innerText = opt;

    div.onclick = () => {
      if (index === q.answer) {
        score++;
        div.style.background = "green";
      } else {
        div.style.background = "red";
      }

      setTimeout(() => {
        nextQuestion();
      }, 700);
    };

    optionsDiv.appendChild(div);
  });
}

function nextQuestion() {
  current = (current + 1) % questions.length;
  loadQuestion();
}

function restartGame() {
  current = 0;
  score = 0;
  loadQuestion();
}

loadQuestion();

</script>

</body>
</html>
